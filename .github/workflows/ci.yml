name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CI: true

jobs:
  root:
    name: Root and Compose
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Validate Docker Compose configuration
        run: docker compose config --quiet

  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm run type-check
      - run: npm run build
      - run: npm test -- --runInBand

  dashboard:
    name: Web dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web-dashboard
    steps:
      - name: Check out repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: web-dashboard/package-lock.json

      - run: npm ci
      - run: npm run type-check
      - run: npm run lint
      - run: npm run build

  mobile:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: VeriGate Pass
            directory: verigate-pass
            lockfile: verigate-pass/package-lock.json
          - name: VeriGate Scan
            directory: verigate-scan
            lockfile: verigate-scan/package-lock.json
    defaults:
      run:
        working-directory: ${{ matrix.directory }}
    steps:
      - name: Check out repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: ${{ matrix.lockfile }}

      - run: npm ci
      - run: npm run type-check
      - run: npm run lint
      - run: npm run doctor
